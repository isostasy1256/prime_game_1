<script>
  const SIZE = 5;
  const LIMIT = 60;

  const board = document.getElementById("board");
  const timeEl = document.getElementById("time");
  const scoreEl = document.getElementById("score");
  const comboEl = document.getElementById("combo");
  const currentNumberEl = document.getElementById("currentNumber");
  const multiplierEl = document.getElementById("multiplier");
  const messageEl = document.getElementById("message");
  const overlay = document.getElementById("overlay");
  const finalScoreEl = document.getElementById("finalScore");

  let numbers = [];
  let selected = [];
  let dragging = false;
  let score = 0n;
  let combo = 0;
  let timeLeft = LIMIT;
  let timer = null;
  let active = true;

  function randomDigit() {
    return Math.floor(Math.random() * 10);
  }

  function makeBoard() {
    numbers = Array.from({ length: SIZE * SIZE }, randomDigit);
  }

  function render() {
    board.innerHTML = "";

    numbers.forEach((num, index) => {
      const tile = document.createElement("button");
      tile.type = "button";
      tile.className = "tile";
      tile.textContent = num;
      tile.dataset.index = index;
      board.appendChild(tile);
    });

    paintSelected();
  }

  function paintSelected() {
    document.querySelectorAll(".tile").forEach(tile => {
      const index = Number(tile.dataset.index);
      tile.classList.toggle("selected", selected.includes(index));
      tile.classList.toggle("last", selected[selected.length - 1] === index);
    });

    currentNumberEl.textContent =
      selected.length === 0
        ? active ? "ドラッグで数字をつなげる" : "タイムアップ"
        : selected.map(i => numbers[i]).join("");
  }

  function isNextTo(a, b) {
    const ax = a % SIZE;
    const ay = Math.floor(a / SIZE);
    const bx = b % SIZE;
    const by = Math.floor(b / SIZE);

    return Math.abs(ax - bx) + Math.abs(ay - by) === 1;
  }

  function modPow(base, exp, mod) {
    let result = 1n;
    base %= mod;

    while (exp > 0n) {
      if (exp % 2n === 1n) result = (result * base) % mod;
      base = (base * base) % mod;
      exp /= 2n;
    }

    return result;
  }

  function isPrime(n) {
    if (n < 2n) return false;

    const smallPrimes = [2n, 3n, 5n, 7n, 11n, 13n, 17n, 19n, 23n, 29n, 31n, 37n];

    for (const p of smallPrimes) {
      if (n === p) return true;
      if (n % p === 0n) return false;
    }

    let d = n - 1n;
    let s = 0n;

    while (d % 2n === 0n) {
      d /= 2n;
      s++;
    }

    const bases = [2n, 3n, 5n, 7n, 11n, 13n, 17n, 19n, 23n, 29n, 31n, 37n];

    for (const a of bases) {
      if (a >= n - 2n) continue;

      let x = modPow(a, d, n);
      if (x === 1n || x === n - 1n) continue;

      let probablyPrime = false;

      for (let r = 1n; r < s; r++) {
        x = (x * x) % n;

        if (x === n - 1n) {
          probablyPrime = true;
          break;
        }
      }

      if (!probablyPrime) return false;
    }

    return true;
  }

  function multiplierPercent(comboCount) {
    return 100n + BigInt(comboCount - 1) * 5n;
  }

  function multiplierText(comboCount) {
    return (Number(multiplierPercent(comboCount)) / 100).toFixed(2);
  }

  function updateStatus() {
    timeEl.textContent = timeLeft;
    scoreEl.textContent = score.toLocaleString();
    comboEl.textContent = combo;
    multiplierEl.textContent = `倍率 ${multiplierText(combo + 1)}x`;
  }

  function setMessage(text, type = "") {
    messageEl.textContent = text;
    messageEl.className = `message ${type}`;
  }

  function indexFromPointer(event) {
    const el = document.elementFromPoint(event.clientX, event.clientY);
    const tile = el?.closest(".tile");
    return tile ? Number(tile.dataset.index) : null;
  }

  function addIndex(index) {
    if (index === null || !active) return;

    const last = selected[selected.length - 1];
    const alreadyIndex = selected.indexOf(index);

    if (alreadyIndex === selected.length - 2) {
      selected.pop();
      paintSelected();
      return;
    }

    if (selected.includes(index)) return;
    if (last !== undefined && !isNextTo(last, index)) return;

    selected.push(index);
    paintSelected();
  }

  function startDrag(event) {
    if (!active) return;

    event.preventDefault();
    dragging = true;
    selected = [];

    board.setPointerCapture?.(event.pointerId);
    addIndex(indexFromPointer(event));
  }

  function moveDrag(event) {
    if (!dragging || !active) return;

    event.preventDefault();
    addIndex(indexFromPointer(event));
  }

  function endDrag(event) {
    if (!dragging || !active) return;

    board.releasePointerCapture?.(event.pointerId);
    dragging = false;

    if (selected.length === 0) return;

    const text = selected.map(i => numbers[i]).join("");
    const value = BigInt(text);

    if (isPrime(value)) {
      combo++;

      const addScore = value * multiplierPercent(combo) / 100n;
      score += addScore;

      selected.forEach(index => {
        numbers[index] = randomDigit();
      });

      setMessage(`${text} は素数！ +${addScore.toLocaleString()} 点`, "success");
      selected = [];
      render();
    } else {
      combo = 0;
      setMessage(`${text} は素数ではありません`, "fail");
      selected = [];
      paintSelected();
    }

    updateStatus();
  }

  function endGame() {
    active = false;
    dragging = false;
    clearInterval(timer);
    finalScoreEl.textContent = score.toLocaleString();
    overlay.classList.add("show");
    paintSelected();
  }

  function tick() {
    timeLeft--;
    updateStatus();

    if (timeLeft <= 0) {
      endGame();
    }
  }

  function restartGame() {
    score = 0n;
    combo = 0;
    timeLeft = LIMIT;
    selected = [];
    dragging = false;
    active = true;

    overlay.classList.remove("show");
    makeBoard();
    render();
    updateStatus();
    setMessage("上下左右に隣り合うマスだけつなげられます");

    clearInterval(timer);
    timer = setInterval(tick, 1000);
  }

  board.addEventListener("pointerdown", startDrag);
  board.addEventListener("pointermove", moveDrag);
  board.addEventListener("pointerup", endDrag);
  board.addEventListener("pointercancel", endDrag);

  document.getElementById("restart").addEventListener("click", restartGame);
  document.getElementById("restart2").addEventListener("click", restartGame);

  restartGame();
</script>
