<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Connect</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

    <h1>Prime Connect</h1>

    <div id="topBar">

        <div class="panel">
            <span>⏱ Time</span>
            <span id="timer">60</span>
        </div>

        <div class="panel">
            <span>⭐ Score</span>
            <span id="score">0</span>
        </div>

        <div class="panel">
            <span>🔥 Combo</span>
            <span id="combo">0</span>
        </div>

    </div>

    <div id="board">
        <!-- JavaScriptで5×5マスを生成 -->
    </div>

    <div id="current">

        <div id="currentLabel">
            作成中の数字
        </div>

        <div id="currentNumber">
            -
        </div>

    </div>

    <div id="buttons">

        <button id="submitButton">
            判定
        </button>

        <button id="resetButton">
            リセット
        </button>

    </div>

    <div id="message">
        ドラッグして数字をつなげよう！
    </div>

</div>

<div id="gameOver" class="hidden">

    <h2>ゲーム終了！</h2>

    <p>
        最終スコア
    </p>

    <h1 id="finalScore">
        0
    </h1>

    <button id="restartButton">
        もう一度遊ぶ
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
